services:
  db:
    image: postgis/postgis:16-3.4
    container_name: meu_caramelo_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: caramelo
      POSTGRES_PASSWORD: caramelo
      POSTGRES_DB: meu_caramelo
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caramelo -d meu_caramelo"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pg_data:
